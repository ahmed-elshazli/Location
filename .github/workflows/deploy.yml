- name: 📤 Sync files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}    # تأكد إنه الـ IP: 82.198.227.251
          username: ${{ secrets.FTP_USERNAME }}  # تأكد إنه: u837916390
          password: ${{ secrets.FTP_PASSWORD }}  # باسورد الحساب الرئيسي
          local-dir: ./dist/
          
          # جرب المسار ده (بدون نقط ولا سلاشات في الأول)
          # لو ده ما اشتغلش، جرب تكتبه كدة: server-dir: ./
          server-dir: public_html/
          
          protocol: ftp
          port: 21
          timeout: 90000