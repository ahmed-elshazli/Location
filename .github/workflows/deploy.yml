name: Deploy Website to Hostinger

on:
  push:
    branches:
      - main  # تأكد إن ده اسم الفرع الأساسي عندك (main أو master)

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    
    # ضمان العمل على Node 24 لتجنب أي مشاكل في الـ Build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🔍 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Install dependencies
        run: npm install

      - name: 🚀 Build project
        run: npm run build

      - name: 📤 Sync files to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }} # تأكد إنه u837916390
          password: ${{ secrets.FTP_PASSWORD }} 
          local-dir: ./dist/
          
          # بما إننا باليوزر الماستر، هنحدد المسار "المطلق" عشان ننهي الجدل
          server-dir: domains/location-properties.com/public_html/
          
          protocol: ftp
          port: 21
          timeout: 90000